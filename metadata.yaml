# YAML metadata format 
dataset_purpose: 
  description: "Includes Omnifold event-level weights to allow the reconstruction of unfolded
    distributions for Z → μμ + jets processes."

dataset_identification:
  filename: "multifold_sherpa.h5"
  process_name: "Z -> mu mu + jets"
  center_of_mass_energy: 13.6  # TeV
  luminosity: 139.0    # fb^-1
  data_taking_period: "Run 3 (2025)"
  num_events: 418400  
  num_columns: 200

event_selection_criteria:
  kinematic_cuts:
    pT_min: 25.0 #GeV
    # I thought of only 1 cut others could come here

units:
  energy : "GeV"
  mass: "GeV"    #mass and energy are equivalent in high energy physics
  momentum: "GeV" 
  angle: "radian"

softwares:
  event_generator:
    software: "Sherpa"
    Version:"1.0.0"
    tune: " "  #this iss just the short code for software's setting 
    parton_showering_model: "CSShower"

  detector_simulation:
    software: "Geant4"
    version:"1.0.0"
    detector_simulated: "Atlas_(date)" #the specific detector that got simualted
    detector_condition: "Good" 

neural_network_info:
  stopping_iteration: 10
  # it means after how many iterations was the omnifold output accepted
  # other info could come here

weight_normalisation_criteria: "absolute normalisation/ normalisation to 1" #it would be one of those i think
# absolute normalisation: sum of weights  = sum of events
# normalisation to 1: sum of weights = 1 (used only for )

observable_dictionary:
  pT_ll: "Transverse momentum of the dilepton system"
  y_ll: "Rapidity of the dilepton system"
  pT_trackj1: "Transverse momentum of the leading track-jet"
  tau2_trackj1: "2-subjettiness of the leading track-jet"
  # ... and so on for the remaining 18

weights_structure:   #format:  weight_type: number of columns  
  weights_nominal: 1
  weights_ensemble:100
  # ... and other weights
  # there could be further subgrouping of weights...


warnings: 
  - "Avoid using this dataset for another physical process"
  - "Avoid using this dataset if our event_selection_criteria doesnt match with yours"

